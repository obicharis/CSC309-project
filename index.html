<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSC 309 – AI Tutor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);font-family:'Courier New',Consolas,monospace;color:#e6edf3;display:flex;flex-direction:column}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
  .d1{animation:bounce 1.2s infinite 0s}.d2{animation:bounce 1.2s infinite .15s}.d3{animation:bounce 1.2s infinite .3s}
  .dot-ind{width:8px;height:8px;border-radius:50%;background:#00d4aa;display:inline-block}
  .sg:hover{background:rgba(0,212,170,.18)!important;transform:translateY(-1px);cursor:pointer}
  textarea:focus{border-color:rgba(0,212,170,.4)!important;outline:none}
  .sb:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 14px rgba(0,212,170,.35)}
  .sb:disabled{cursor:not-allowed!important;opacity:.5}
  ol,ul{padding-left:20px}li{margin-bottom:4px;line-height:1.6}
  p{margin:5px 0;line-height:1.65}

  #hdr{border-bottom:1px solid #21262d;padding:14px 18px;background:rgba(13,17,23,.97);position:sticky;top:0;z-index:10}
  #hdrInner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px}
  #badge{background:linear-gradient(135deg,#00d4aa,#00a8ff);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;color:#0d1117;letter-spacing:.05em;flex-shrink:0}
  #hdrTitle{font-size:14px;font-weight:700;color:#00d4aa;letter-spacing:.02em}
  #hdrSub{font-size:11px;color:#8b949e;margin-top:1px}
  #statusDot{width:8px;height:8px;border-radius:50%;background:#00d4aa;box-shadow:0 0 7px #00d4aa;animation:pulse 2s infinite;flex-shrink:0;margin-left:auto}

  #chat{flex:1;max-width:760px;width:100%;margin:0 auto;padding:18px 14px 8px;display:flex;flex-direction:column;gap:14px}
  #welcome{text-align:center;padding:32px 16px 16px}
  #wIcon{font-size:46px;margin-bottom:10px}
  #wTitle{font-size:19px;font-weight:700;color:#00d4aa;margin-bottom:7px}
  #wText{font-size:13px;color:#8b949e;line-height:1.65;margin-bottom:22px}
  #suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .sg{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.22);border-radius:20px;padding:6px 13px;font-size:12px;color:#00d4aa;transition:all .15s;font-family:inherit}
  .userBubble{align-self:flex-end;max-width:80%;background:linear-gradient(135deg,rgba(0,168,255,.15),rgba(0,212,170,.15));border:1px solid rgba(0,168,255,.3);border-radius:16px 16px 3px 16px;padding:11px 15px;font-size:14px;color:#cdd9e5;line-height:1.5;word-break:break-word}
  .aiBubble{align-self:flex-start;max-width:92%;background:rgba(22,27,34,.9);border:1px solid #30363d;border-radius:16px 16px 16px 3px;padding:13px 16px;font-size:13.5px;color:#e6edf3;word-break:break-word}
  .aiLabel{font-size:10px;font-weight:700;color:#00d4aa;letter-spacing:.1em;margin-bottom:8px}
  #thinking{align-self:flex-start;display:none;gap:6px;padding:14px 18px;background:rgba(22,27,34,.8);border:1px solid #30363d;border-radius:16px 16px 16px 3px}
  #errBox{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#ff7b72;text-align:center;display:none}

  #inputArea{border-top:1px solid #21262d;background:rgba(13,17,23,.97);padding:12px 14px 18px;position:sticky;bottom:0}
  #inputWrap{max-width:760px;margin:0 auto;display:flex;gap:9px;align-items:flex-end}
  #qInput{flex:1;background:rgba(22,27,34,.8);border:1px solid #30363d;border-radius:13px;padding:11px 15px;font-size:14px;color:#e6edf3;font-family:inherit;resize:none;min-height:46px;max-height:130px;overflow-y:auto;line-height:1.5;transition:border-color .15s}
  #sendBtn{background:linear-gradient(135deg,#00d4aa,#00a8ff);border:none;border-radius:12px;width:46px;height:46px;font-size:20px;color:#0d1117;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;cursor:pointer}
  #hint{max-width:760px;margin:5px auto 0;font-size:11px;color:#484f58;text-align:center}

  @media(max-width:480px){
    #hdr{padding:11px 12px}#hdrTitle{font-size:13px}
    #chat{padding:14px 10px 6px}
    #wTitle{font-size:16px}#wText{font-size:12px}
    .sg{font-size:11px;padding:5px 11px}
  }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdrInner">
    <div id="badge">CSC 309</div>
    <div>
      <div id="hdrTitle">AI Question Answering System</div>
      <div id="hdrSub">Introduction to Artificial Intelligence · RAG-Powered</div>
    </div>
    <div id="statusDot"></div>
  </div>
</div>

<div id="chat">
  <div id="welcome">
    <div id="wIcon">🤖</div>
    <div id="wTitle">Ask me anything about CSC 309</div>
    <div id="wText">This system searches your course material to find relevant context,<br>then generates accurate answers grounded in your lecture notes.</div>
    <div id="suggestions">
      <button class="sg" onclick="ask('What is Artificial Intelligence?')">What is Artificial Intelligence?</button>
      <button class="sg" onclick="ask('Explain the Turing Test')">Explain the Turing Test</button>
      <button class="sg" onclick="ask('What are types of Machine Learning?')">What are types of Machine Learning?</button>
      <button class="sg" onclick="ask('How do CNNs work?')">How do CNNs work?</button>
      <button class="sg" onclick="ask('What is NLP and its applications?')">What is NLP and its applications?</button>
      <button class="sg" onclick="ask('Advantages and disadvantages of AI')">Advantages and disadvantages of AI</button>
      <button class="sg" onclick="ask('Explain backpropagation')">Explain backpropagation</button>
      <button class="sg" onclick="ask('What is reinforcement learning?')">What is reinforcement learning?</button>
      <button class="sg" onclick="ask('How does BERT work?')">How does BERT work?</button>
      <button class="sg" onclick="ask('What are Expert Systems?')">What are Expert Systems?</button>
    </div>
  </div>
  <div id="thinking">
    <div class="dot-ind d1"></div>
    <div class="dot-ind d2"></div>
    <div class="dot-ind d3"></div>
  </div>
  <div id="errBox"></div>
  <div id="bottom"></div>
</div>

<div id="inputArea">
  <div id="inputWrap">
    <textarea id="qInput" rows="1" placeholder="Ask a question about CSC 309 material…" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" class="sb" onclick="ask()">↑</button>
  </div>
  <div id="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
let loading = false;

function scrollBottom() {
  document.getElementById("bottom").scrollIntoView({ behavior: "smooth" });
}

function addBubble(role, text) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.style.display = "none";
  const chat = document.getElementById("chat");
  const div = document.createElement("div");

  if (role === "user") {
    div.className = "userBubble";
    div.textContent = text;
  } else {
    div.className = "aiBubble";
    const label = document.createElement("div");
    label.className = "aiLabel";
    label.textContent = "⚡ COURSE TUTOR";
    div.appendChild(label);
    renderMarkdown(text, div);
  }
  chat.insertBefore(div, document.getElementById("thinking"));
  scrollBottom();
}

function renderMarkdown(text, container) {
  const lines = text.split("\n");
  let i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (!l.trim()) { i++; continue; }
    if (/^\d+\.\s/.test(l)) {
      const ol = document.createElement("ol");
      ol.style.margin = "6px 0";
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        const li = document.createElement("li");
        li.textContent = lines[i++].replace(/^\d+\.\s/, "");
        ol.appendChild(li);
      }
      container.appendChild(ol);
    } else if (/^[-•*]\s/.test(l)) {
      const ul = document.createElement("ul");
      ul.style.margin = "6px 0";
      while (i < lines.length && /^[-•*]\s/.test(lines[i])) {
        const li = document.createElement("li");
        li.textContent = lines[i++].replace(/^[-•*]\s/, "");
        ul.appendChild(li);
      }
      container.appendChild(ul);
    } else {
      const p = document.createElement("p");
      p.textContent = l;
      container.appendChild(p);
      i++;
    }
  }
}

function setLoading(on) {
  loading = on;
  document.getElementById("thinking").style.display = on ? "flex" : "none";
  document.getElementById("sendBtn").disabled = on;
  document.getElementById("qInput").disabled = on;
  if (on) scrollBottom();
}

function showErr(msg) {
  const e = document.getElementById("errBox");
  e.textContent = msg ? "⚠ " + msg : "";
  e.style.display = msg ? "block" : "none";
}

async function ask(preset) {
  if (loading) return;
  const input = document.getElementById("qInput");
  const q = (preset || input.value).trim();
  if (!q) return;
  input.value = "";
  input.style.height = "auto";
  showErr("");
  addBubble("user", q);
  setLoading(true);

  try {
    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
    setLoading(false);
    addBubble("assistant", data.answer);
  } catch (err) {
    setLoading(false);
    showErr(err.message || "Something went wrong.");
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
}

document.getElementById("qInput").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 130) + "px";
});
</script>
</body>
</html>
